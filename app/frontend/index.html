<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Casual Gaming — Demo Frontend</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
      :root {
        color-scheme: light dark;
        font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      body {
        margin: 0;
        background: #0b1220;
        color: #e5e7eb;
      }
      .container {
        max-width: 860px;
        margin: 0 auto;
        padding: 24px 16px 40px;
      }
      .card {
        background: #121a2b;
        border: 1px solid #24314a;
        border-radius: 12px;
        padding: 16px;
        margin-bottom: 16px;
      }
      h1 {
        margin-top: 0;
      }
      label {
        display: block;
        margin-bottom: 8px;
      }
      input, button {
        width: 100%;
        border-radius: 8px;
        border: 1px solid #364968;
        padding: 10px 12px;
        box-sizing: border-box;
      }
      input {
        margin-bottom: 12px;
        background: #0c1528;
        color: #f3f4f6;
      }
      button {
        cursor: pointer;
        background: #2b6ef5;
        color: white;
        font-weight: 600;
      }
      .error {
        color: #fca5a5;
        margin-top: 8px;
      }
      .token {
        word-break: break-all;
        font-size: 0.9rem;
        color: #93c5fd;
      }
      ul {
        padding-left: 20px;
      }
      li + li {
        margin-top: 10px;
      }
      .muted {
        color: #9ca3af;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel">
      const { useState } = React;

      function formatDate(iso) {
        try {
          return new Date(iso).toLocaleString();
        } catch {
          return iso;
        }
      }

      function App() {
        const [username, setUsername] = useState("");
        const [password, setPassword] = useState("");
        const [token, setToken] = useState("");
        const [tasks, setTasks] = useState([]);
        const [error, setError] = useState("");
        const [loading, setLoading] = useState(false);

        const onLogin = async (event) => {
          event.preventDefault();
          setError("");
          setLoading(true);
          setTasks([]);

          try {
            const response = await fetch("/auth/login", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ username, password }),
            });

            if (!response.ok) {
              const detail = await response.json().catch(() => ({}));
              throw new Error(detail.detail || "Ошибка входа");
            }

            const data = await response.json();
            setToken(data.access_token);
          } catch (err) {
            setToken("");
            setError(err.message || "Не удалось выполнить вход");
          } finally {
            setLoading(false);
          }
        };

        const loadTasks = async () => {
          setError("");
          setLoading(true);

          try {
            const response = await fetch("/tasks/active", {
              headers: { Authorization: `Bearer ${token}` },
            });

            if (!response.ok) {
              const detail = await response.json().catch(() => ({}));
              throw new Error(detail.detail || "Ошибка загрузки задач");
            }

            const data = await response.json();
            setTasks(data);
          } catch (err) {
            setError(err.message || "Не удалось загрузить задачи");
          } finally {
            setLoading(false);
          }
        };

        return (
          <div className="container">
            <h1>Casual Gaming Demo Frontend</h1>
            <p className="muted">Простая React-страница для проверки API логина и активных задач.</p>

            <div className="card">
              <h2>1) Вход</h2>
              <form onSubmit={onLogin}>
                <label htmlFor="username">Username</label>
                <input id="username" value={username} onChange={(e) => setUsername(e.target.value)} required />

                <label htmlFor="password">Password</label>
                <input
                  id="password"
                  type="password"
                  value={password}
                  onChange={(e) => setPassword(e.target.value)}
                  required
                />

                <button type="submit" disabled={loading}>{loading ? "Входим..." : "Войти"}</button>
              </form>
              {token && (
                <>
                  <p><strong>Токен получен:</strong></p>
                  <div className="token">{token}</div>
                </>
              )}
            </div>

            <div className="card">
              <h2>2) Активные задачи</h2>
              <button onClick={loadTasks} disabled={!token || loading}>
                {loading ? "Загружаем..." : "Загрузить /tasks/active"}
              </button>

              {!tasks.length ? (
                <p className="muted">Задач пока нет (или они недоступны для текущей команды).</p>
              ) : (
                <ul>
                  {tasks.map((task) => (
                    <li key={task.id}>
                      <strong>{task.title}</strong>
                      <div>{task.description}</div>
                      <small>
                        Открыто: {formatDate(task.open_at)} · Закрыто: {formatDate(task.close_at)}
                      </small>
                    </li>
                  ))}
                </ul>
              )}
            </div>

            {error && <p className="error">{error}</p>}
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
